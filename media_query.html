<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Mobile first, we start from the smallest viewport width */
        @media only screen and (min-width: 320px) and (max-width: 798px){
            body{
                background: red;
            }
            h1{
                color: blue;
            }
        }


        /* From 799px and up */
        @media (min-width:799px){
            body {
                background: orange;
            }
            img{
                display: none;
            }
        }


        @media (min-width:1000px){
            body{
                background: skyblue;
            }
        }


        @media (min-width:1200px){
            body{
                background: blue;
            }
        }



    </style>
</head>
<body>
    <h1>Hello Everyone</h1>

    <h2>Welcome to FCT</h2>

    <img src="images/laptop.png" alt="laptop"/>

    <h3>We are learning WD</h3>

    <h4>We are learning about media query</h4>
</body>
</html>
